<style>
:root {
  /* Brand core */
  --color-primary: #3b877b;

  /* Block-type families */

  --ecografia: #4f9b8c;
  --bloco: #34568a;
  --reuniao: #6c7a88;
  --trabna: #566069;

  --dc: #9aa0a6;

  --lazer: #8b76b0;

  --neg: #c75f1c;
  --warn: #e67e22;

  /* Scenario anchors */

  --sc-b: #2c3e50;
  --sc-c: #4a6d8a;
  --sc: var(--urgencia);

  --shadow-lg: 0 20px 50px -20px rgba(44, 62, 80, 0.35);
}

// =========== HELPERS ===========
function fmt(n) { return new Intl.NumberFormat('pt-PT', {minimumFractionDigits: 0, maximumFractionDigits: 0}).format(Math.round(n)) + '€'; }
function fmtH(h) {
  if (h === 0) return '0h';
  const r = Math.round(h * 100) / 100;
  return r % 1 === 0 ? r + 'h' : r.toFixed(2).replace('.', ',') + 'h';
}
function toMin(t) { const p = t.split(':').map(Number); return p[0]*60+p[1]; }
function fromMin(m) { m = ((m % 1440) + 1440) % 1440; const h = Math.floor(m/60); const mi = Math.floor(m%60); return String(h).padStart(2,'0') + ':' + String(mi).padStart(2,'0'); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

function classifyHour(dayIdx, hourOfDay) {
  let day = dayIdx, hour = hourOfDay;
  while (hour >= 24) { hour -= 24; day = (day + 1) % 7; }
  while (hour < 0) { hour += 24; day = (day - 1 + 7) % 7; }
  if (hour >= 20) {
    if (day === 5 || day === 6) return 'Z4';
    return 'Z2';
  } else if (hour < 8) {
    const prev = (day - 1 + 7) % 7;
    if (prev === 5 || prev === 6) return 'Z4';
    return 'Z2';
  } else {
    if (day === 6) return 'Z3';
    if (day === 5) { if (hour < 13) return 'Z1'; return 'Z3'; }
    return 'Z1';
  }
}

function splitBlockByZone(block, dayIdx) {
  const result = { Z1: 0, Z2: 0, Z3: 0, Z4: 0 };
  const startHour = toMin(block.startTime) / 60;
  const totalHours = block.duration;
  const step = 0.25;
  let cur = 0;
  while (cur < totalHours) {
    const remaining = totalHours - cur;
    const thisStep = Math.min(step, remaining);
    const midHour = startHour + cur + thisStep / 2;
    const zone = classifyHour(dayIdx, midHour);
    result[zone] += thisStep;
    cur += thisStep;
  }
  for (const k of Object.keys(result)) result[k] = Math.round(result[k] * 4) / 4;
  return result;
}

function sundayHours(block, dayIdx) {
  const startHour = toMin(block.startTime) / 60;
  const totalHours = block.duration;
  const step = 0.25;
  let sunH = 0;
  let cur = 0;
  while (cur < totalHours) {
    const remaining = totalHours - cur;
    const thisStep = Math.min(step, remaining);
    const midHour = startHour + cur + thisStep / 2;
    let day = dayIdx, hour = midHour;
    while (hour >= 24) { hour -= 24; day = (day + 1) % 7; }
    if (day === 6) sunH += thisStep;
    cur += thisStep;
  }
  return Math.round(sunH * 4) / 4;
}

function calcIRSProgressivo(rc) {
  if (rc <= 0) return 0;
  let imposto = 0, lastLimit = 0;
  for (const esc of IRS_ESCALOES) {

    imposto += (esc.limite - lastLimit) * esc.taxa;
    lastLimit = esc.limite;
  }
  return imposto;
}

// =========== STORAGE ===========
async function loadFromStorage(key, defaultValue) {
  try {
    if (typeof window.storage === 'undefined' || !window.storage) return defaultValue;
    const result = await window.storage.get(key);
    if (result && result.value) return JSON.parse(result.value);
  } catch (e) { /* missing or unavailable */ }
  return defaultValue;
}

async function saveToStorage(key, value) {
  try {
    if (typeof window.storage === 'undefined' || !window.storage) return;
    await window.storage.set(key, JSON.stringify(value));
  } catch (e) { /* ignore */ }
}

  okBtn.textContent = 'Confirmar';
  okBtn.style.cssText = 'background:#2c3e50;color:#ffffff;border:none;padding:10px 18px;font-family:inherit;font-size:14px;cursor:pointer;border-radius:0;font-weight:500;';
  okBtn.addEventListener('click', () => {
    overlay.remove();
    try { onConfirm(); } catch (e) { console.error(e); }
  });

  btns.appendChild(cancelBtn);
  btns.appendChild(okBtn);
  box.appendChild(btns);
  overlay.appendChild(box);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  document.body.appendChild(overlay);
}

// =========== CALCULATION ===========
function getBaseInfo() {
  const cat = CATEGORIES[state.config.categoria];
  return cat.find(c => c.pos === state.config.posicao) || cat[0];
}

function calcScenario(scKey) {
  const sc = SCENARIOS[scKey];
  const cal = state.calendars[scKey];
  const baseInfo = getBaseInfo();
  const baseMensal = baseInfo.vMes * (1 - sc.baseReductionPct);
  const dpMensal = sc.hasDP ? baseMensal * 0.25 : 0;
  // R (tarifa horária para prémios/TE) é independente do contrato — o vHora da tabela TRU
  // é o mesmo para 40h e 36h; apenas a base mensal escala (porque há menos horas/mês).
  const R = baseInfo.vHora * (sc.hasDP ? 1.25 : 1);

  let totalRealH = 0, totalSU = 0, totalSUExtra = 0;
  let totalPrivHByType = {};
  let privadoRemun8Sem = 0;
  let folgaCredits = 0, folgaUsed = 0, dcCount = 0;
  const folgaSunHByWeek = {}; // horas de su-extra que caem no domingo, somadas por semana (1 domingo/semana)
  let suplementos = 0, teRemun = 0;
  let activeDays = 0;
  const zoneBreakdown = { Z1: 0, Z2: 0, Z3: 0, Z4: 0 };
  const teZoneBreakdown = { Z1: 0, Z2: 0, Z3: 0, Z4: 0 };
  const tnRemunByZone = { Z1: 0, Z2: 0, Z3: 0, Z4: 0 };
  const teRemunByZone = { Z1: 0, Z2: 0, Z3: 0, Z4: 0 };
  const byType = {};
  const errors = [];

  cal.forEach((week, wi) => {
    // Detecção de sobreposição ao longo da semana inteira (incl. blocos que atravessam meia-noite)
    const weekIntervals = [];
    week.forEach((day, di) => {
      day.forEach(b => {
        const m = BLOCK_TYPES[b.type];
        if (!m || !b.duration || b.type === 'dc' || b.type === 'folga') return;
        const startAbs = di * 1440 + toMin(b.startTime);
        weekIntervals.push({
          start: startAbs,
          end: startAbs + b.duration * 60,
          day: di,
          short: m.short
        });
      });
    });
    weekIntervals.sort((a, b) => a.start - b.start);
    for (let i = 1; i < weekIntervals.length; i++) {
      if (weekIntervals[i].start < weekIntervals[i-1].end) {
        const prev = weekIntervals[i-1], cur = weekIntervals[i];
        const daySpec = prev.day === cur.day ? DAY_LABELS[prev.day] : DAY_LABELS[prev.day] + '→' + DAY_LABELS[cur.day];
        errors.push('S' + (wi+1) + ' ' + daySpec + ': sobreposição ' + prev.short + ' × ' + cur.short);
      }
    }

    week.forEach((day, di) => {
      const dayBlocks = day.filter(b => BLOCK_TYPES[b.type]);
      const dayHrs = dayBlocks.filter(b => BLOCK_TYPES[b.type].counts).reduce((s, b) => s + b.duration, 0);
      if (dayHrs > 24) errors.push('S' + (wi+1) + ' ' + DAY_LABELS[di] + ': ' + dayHrs + 'h > 24h');
      if (day.some(b => {
        const m = BLOCK_TYPES[b.type];
        if (!m || !m.counts || m.isTE || !b.duration) return false;
        const startH = toMin(b.startTime) / 60;
        return (startH + b.duration) <= 24;
      })) activeDays += 1;

      day.forEach(block => {
        const meta = BLOCK_TYPES[block.type];
        if (!meta) return;
        byType[block.type] = (byType[block.type] || 0) + (block.duration || 0);
        if (meta.isLeisure) return; // lazer: aparece no calendário e no byType, mas não afecta cálculos
        if (meta.isPrivate) {
          totalPrivHByType[block.type] = (totalPrivHByType[block.type] || 0) + block.duration;
          privadoRemun8Sem += block.duration * getPrivateRate(block.type);
          return;
        }
        if (block.type === 'folga') { folgaUsed += 1; totalRealH += Math.min(block.duration || 0, 8); return; } // folga conta como tempo de trabalho em TODOS os cenários (máx 8h)
        if (block.type === 'dc') { dcCount += 1; if (!sc.hasDP) totalRealH += (block.duration || 0); return; } // DC conta como tempo de trabalho só FORA da Dedicação Plena
        if (meta.isSU) {
          // Folga: só horas de SU extra (su-extra) que caem no domingo contam.
          // Somam-se entre blocos do mesmo domingo (chave = semana, di=6); 1 folga se o total >=4h.
          if (block.type === 'su-extra') {
            const sunH = sundayHours(block, di);
            if (sunH > 0) folgaSunHByWeek[wi] = (folgaSunHByWeek[wi] || 0) + sunH;
          }
          if (block.type === 'su') totalSU += block.duration;
          else totalSUExtra += block.duration;
        }
        // SU+ (isTE) é trabalho extra; não conta para o mínimo contratual de horas
        if (meta.counts && !meta.isTE) totalRealH += block.duration;
        const zones = splitBlockByZone(block, di);
        for (const z of Object.keys(zones)) zoneBreakdown[z] += zones[z];

        if (meta.isTE) {
          const rates = {
            Z1: { first: 1.25, rest: 1.5 },
            Z2: { first: 1.75, rest: 2 },
            Z3: { first: 1.75, rest: 2 },
            Z4: { first: 2.25, rest: 2.5 }
          };
          const blockStartHour = toMin(block.startTime) / 60;
          const step = 0.25;
          let cur = 0;
          while (cur < block.duration) {
            const thisStep = Math.min(step, block.duration - cur);
            const midHour = blockStartHour + cur + thisStep / 2;
            const z = classifyHour(di, midHour);
            const isFirstHour = cur < 1;
            const rate = isFirstHour ? rates[z].first : rates[z].rest;
            const eur = thisStep * rate * R;
            teRemun += eur;
            teRemunByZone[z] += eur;
            teZoneBreakdown[z] += thisStep;
            cur += thisStep;
          }
        } else {
          const mults = { Z1: 1, Z2: 1.5, Z3: 1.5, Z4: 2 };
          for (const z of Object.keys(zones)) {
            const h = zones[z];
            if (h === 0) continue;
            const eur = h * (mults[z] - 1) * R;
            suplementos += eur;
            tnRemunByZone[z] += eur;
          }
        }
      });
    });
  });

  folgaCredits = Object.values(folgaSunHByWeek).filter(h => h >= 4).length; // 1 folga por domingo com >=4h de su-extra (somadas entre blocos)
  const suMinSatisfied = totalSU >= sc.suMinBase;
  const folgasAvailable = folgaCredits - folgaUsed;
  if (folgaUsed > folgaCredits) errors.push('Folgas usadas (' + folgaUsed + ') > créditos (' + folgaCredits + ')');

  // Total contratual (8 semanas) — não muda com amamentação
  // Amamentação ACRESCENTA 2h fictícias por cada dia em que pelo menos um bloco termina no mesmo dia
  const contractualWeekly = 40 * (1 - sc.baseReductionPct);
  const totalContratual = contractualWeekly * 8;
  const amamBonus = state.config.amamentacao ? 2 * activeDays : 0;
  const totalRealHEffective = totalRealH + amamBonus;
  const totalRequired = totalContratual;
  const totalHorasOk = totalRealHEffective >= totalRequired;

  const annualBaseFixed = baseMensal * 14 + dpMensal * 14;
  const annualSuplementos = suplementos * 6.5 * (1 - HOL_ANNUAL_DISCOUNT);
  const annualTE = teRemun * 6.5 * (1 - HOL_ANNUAL_DISCOUNT);
  const annualPrivado = privadoRemun8Sem * 6.5 * (1 - HOL_ANNUAL_DISCOUNT);
  const brutoPubAnual = annualBaseFixed + annualSuplementos + annualTE;
  const brutoMensalMedia = brutoPubAnual / 12;
  const ssAnual = brutoPubAnual * 0.11;
  const dedEspecifica = Math.max(4104, ssAnual);
  const rcMariana = Math.max(0, brutoPubAnual - dedEspecifica);
  const ssConjuge = (state.config.conjugeBruto || 0) * 0.11;
  const dedConjuge = Math.max(4104, ssConjuge);
  const rcConjuge = Math.max(0, (state.config.conjugeBruto || 0) - dedConjuge);
  const rcFamilia = rcMariana + rcConjuge;
  // Colecta familiar (progressiva, quociente conjugal) e deduções à colecta
  // Assume-se 1 200€ fixos como aproximação (despesas gerais + dependentes + PPR + saúde),
  // valor típico de um casal com um filho e despesas declaradas regulares.
  const IRS_DEDUCOES_COLECTA = 1200;
  const coletaFamilia = calcIRSProgressivo(rcFamilia / 2) * 2;
  const irsFamilia = Math.max(0, coletaFamilia - IRS_DEDUCOES_COLECTA);
  const irsMariana = rcFamilia > 0 ? irsFamilia * (rcMariana / rcFamilia) : 0;
  const taxaMediaMariana = brutoPubAnual > 0 ? irsMariana / brutoPubAnual : 0;
  const liquidoAnual = brutoPubAnual - ssAnual - irsMariana;
  const liquidoMensal = liquidoAnual / 12;

  // === 8-week earnings (literal for variables; base extrapolated from annual × 8/52) ===
  const base8Sem = baseMensal * 14 * 8 / 52;
  const dp8Sem = dpMensal * 14 * 8 / 52;
  const baseDp8Sem = base8Sem + dp8Sem;
  const suplementos8Sem = suplementos; // literal
  const te8Sem = teRemun; // literal
  const pub8SemTotal = baseDp8Sem + suplementos8Sem + te8Sem;
  const privCons8Sem = (totalPrivHByType['consulta-priv'] || 0) * getPrivateRate('consulta-priv');
  const privEco8Sem = (totalPrivHByType['ecografia-priv'] || 0) * getPrivateRate('ecografia-priv');
  // Total dos custom types (todos os privados que não sejam os dois built-in)
  let privCustom8Sem = 0;
  Object.keys(totalPrivHByType).forEach(t => {
    if (t === 'consulta-priv' || t === 'ecografia-priv') return;
    privCustom8Sem += totalPrivHByType[t] * getPrivateRate(t);
  });
  const priv8SemTotal = privadoRemun8Sem;
  const total8Sem = pub8SemTotal + priv8SemTotal;
  // Backwards-compat: hours per built-in private type for any legacy consumer
  const totalPrivE = totalPrivHByType['ecografia-priv'] || 0;
  const totalPrivC = totalPrivHByType['consulta-priv'] || 0;

  return {
    sc, cal, baseMensal, dpMensal, R,
    totalRealH, totalSU, totalSUExtra, totalPrivE, totalPrivC,
    folgaCredits, folgaUsed, folgasAvailable, dcCount,
    suplementos, teRemun, zoneBreakdown, teZoneBreakdown, byType,
    tnRemunByZone, teRemunByZone,
    brutoPubAnual, brutoMensalMedia,
    annualBaseFixed, annualSuplementos, annualTE, annualPrivado,
    ssAnual, rcMariana, irsMariana, taxaMediaMariana,
    liquidoAnual, liquidoMensal,
    privadoBrutoAnual: annualPrivado, privadoBrutoMensal: annualPrivado / 12,
    base8Sem, dp8Sem, baseDp8Sem, suplementos8Sem, te8Sem, pub8SemTotal,
    privEco8Sem, privCons8Sem, privCustom8Sem, priv8SemTotal, total8Sem, totalPrivHByType,
    activeDays, totalContratual, amamBonus, totalRealHEffective, totalRequired, totalHorasOk,
    errors, suMinSatisfied
  };
}

function calcAll() {
  return { A: calcScenario('A'), B: calcScenario('B'), C: calcScenario('C') };
}

function renderLeisureTypes() {
  const ids = Object.keys(state.config.leisureTypes || {});
  const html = `
    <section class="config">
      <h2 class="section-title">Lazer <small style="font-size:12px; color:var(--ink-muted); font-style:italic; font-family:Inter,sans-serif">· blocos não remunerados</small></h2>
      <div class="priv-types-grid">
        ${ids.map(id => {
          const lt = state.config.leisureTypes[id];
          return `
            <div class="priv-type-row">
              <input type="text" class="priv-type-label-input" data-leisure-label="${id}" value="${esc(lt.label)}" placeholder="Nome">
              <div class="priv-type-rate">
                <input type="number" min="0.25" step="0.25" max="24" data-leisure-dur="${id}" value="${lt.defaultDur}" style="width:64px">
                <span>h</span>
                <button class="priv-type-del" data-del-leisure="${id}" title="Eliminar tipo">×</button>
              </div>
            </div>
          `;
        }).join('') || '<div style="color:var(--ink-muted); font-style:italic; font-family:Inter,sans-serif; font-size:13px">— sem tipos definidos</div>'}
      </div>
      <button id="add-leisure-type" class="btn secondary" style="margin-top:12px">+ Adicionar tipo de lazer</button>
    </section>
  `;
  document.getElementById('leisure-types-mount').innerHTML = html;

  document.querySelectorAll('[data-leisure-label]').forEach(inp => {
    inp.addEventListener('change', e => {
      const id = e.target.getAttribute('data-leisure-label');
      const newLabel = (e.target.value || '').trim() || 'Lazer';
      state.config.leisureTypes[id].label = newLabel;
      state.config.leisureTypes[id].short = newLabel.substring(0, 5);
      registerLeisureType(id, state.config.leisureTypes[id]);
      persistConfig();
      renderAll();
    });
  });

  document.querySelectorAll('[data-leisure-dur]').forEach(inp => {
    inp.addEventListener('change', e => {
      const id = e.target.getAttribute('data-leisure-dur');
      const v = parseFloat(e.target.value);
      const dur = (isFinite(v) && v > 0) ? Math.round(v * 4) / 4 : 1;
      state.config.leisureTypes[id].defaultDur = dur;
      registerLeisureType(id, state.config.leisureTypes[id]);
      persistConfig();
      renderAllDependents();
    });
  });

  document.querySelectorAll('[data-del-leisure]').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.target.getAttribute('data-del-leisure');
      const lt = state.config.leisureTypes[id];
      let usage = 0;
      ['A','B','C'].forEach(sc => {
        state.calendars[sc].forEach(week => week.forEach(day => day.forEach(b => { if (b.type === id) usage++; })));
      });
      const msg = usage > 0
        ? 'Eliminar "' + lt.label + '"? Há ' + usage + ' bloco(s) no calendário que serão também removidos.'
        : 'Eliminar tipo "' + lt.label + '"?';
      showConfirm(msg, () => {
        ['A','B','C'].forEach(sc => {
          state.calendars[sc].forEach(week => week.forEach((day, di) => {
            week[di] = day.filter(b => b.type !== id);
          }));
          persistCalendar(sc);
        });
        delete state.config.leisureTypes[id];
        delete BLOCK_TYPES[id];
        if (state.lastUsed[id]) delete state.lastUsed[id];
        persistConfig();
        persistLastUsed();
        renderAll();
      });
    });
  });

  document.getElementById('add-leisure-type').addEventListener('click', () => {
    const existing = Object.keys(state.config.leisureTypes || {});
    let n = existing.length + 1;
    let id = 'lazer-' + n;
    while (BLOCK_TYPES[id]) { n++; id = 'lazer-' + n; }
    const lt = {
      label: 'Lazer ' + n,
      short: 'L' + n,
      defaultDur: 1,
      defaultStart: '07:00'
    };
    state.config.leisureTypes[id] = lt;
    registerLeisureType(id, lt);
    persistConfig();
    renderAll();
  });
}

        : 'Eliminar tipo "' + ct.label + '"?';
      showConfirm(msg, () => {

        ['A','B','C'].forEach(sc => {

    const ct = {

    };
    state.config.customTypes[id] = ct;
    state.config.privateRates[id] = 80;
    registerCustomType(id, ct);
    persistConfig();
    renderAll();
  });
}

    renderConfig();

    persistConfig();

  document.getElementById('inp-amamentacao').addEventListener('change', e => {

    persistConfig();

}

function renderTabs(calcs) {
  function tabStatus(calc) {
    if (calc.errors.length > 0) return 'err';
    if (!calc.suMinSatisfied || !calc.totalHorasOk) return 'warn';
    return 'ok';
  }
  const html = `
    <div class="tabs">
      ${Object.keys(SCENARIOS).map(key => {
        const sc = SCENARIOS[key];
        const calc = calcs[key];
        const status = tabStatus(calc);
        const active = state.currentScenario === key;
        return `
          <button class="tab scope-${key} ${active?'active':''} status-${status}" data-tab="${key}">
            <span class="tab-letter">${key}</span>
            <div class="tab-name">${esc(sc.name)}</div>
            <div class="tab-meta">${sc.meta.join(' · ')}</div>

// Map hour-of-day to pixel position within a 140px cell.
// Compressed nights (0-8h, 20-24h), expanded daytime (8-14h, 14-20h).
function hourToPixel(hour) {
  if (hour <= 0) return 0;
  if (hour >= 24) return 140;
  if (hour <= 8) return (hour / 8) * 22;
  if (hour <= 14) return 22 + ((hour - 8) / 6) * 48;
  if (hour <= 20) return 70 + ((hour - 14) / 6) * 48;
  return 118 + ((hour - 20) / 4) * 22;
}

function getSlicesForDay(blocks) {
  const slices = [];
  blocks.forEach((b, idx) => {
    const meta = BLOCK_TYPES[b.type];
    if (!meta) return;
    if (!b.duration || b.duration <= 0) return;
    const startHour = toMin(b.startTime) / 60;
    const endHour = Math.min(24, startHour + b.duration);
    if (endHour <= startHour) return;
    slices.push({ block: b, blockIdx: idx, startHour, endHour, meta });
  });
  return slices;
}

function getShadowsForDay(cal, week, day) {
  const shadows = [];
  let prevWeek = week, prevDay = day - 1;
  if (prevDay < 0) { prevDay = 6; prevWeek -= 1; }
  if (prevWeek < 0) return shadows;
  const prevBlocks = cal[prevWeek][prevDay];
  prevBlocks.forEach(b => {
    const meta = BLOCK_TYPES[b.type];
    if (!meta) return;
    if (!b.duration || b.duration <= 0) return;
    const startHour = toMin(b.startTime) / 60;
    const endHour = startHour + b.duration;
    if (endHour > 24) {
      shadows.push({ block: b, startHour: 0, endHour: Math.min(24, endHour - 24), meta });
    }
  });
  return shadows;
}

function renderCalendar() {
  const cs = state.currentScenario;
  const cal = state.calendars[cs];
  const mount = document.getElementById('calendar-mount');
  const weekHasData = (week) => week.some(d => d.length > 0);
  const html = `
    <div class="calendar">
      <div class="cal-grid">
        <div class="cal-header"></div>
        ${DAY_LABELS.map((d, i) => `<div class="cal-header ${i>=5?'weekend':''}">${d}</div>`).join('')}
        ${cal.map((week, wi) => {
          const canCopyPrev = wi > 0;
          let row = `
            <div class="cal-wknum">
              <span class="wknum-label">${wi+1}</span>
              <div class="wk-btns">
                ${canCopyPrev ? `<button type="button" class="wk-btn" data-wk-copy="${wi}" title="Copiar semana ${wi}">↓</button>` : ''}
                <button type="button" class="wk-btn clear" data-wk-clear="${wi}" title="Limpar semana ${wi+1}">×</button>
              </div>
            </div>
          `;
          row += week.map((day, di) => {
            const dayHrs = day.filter(b => BLOCK_TYPES[b.type] && BLOCK_TYPES[b.type].counts).reduce((s, b) => s + b.duration, 0);
            const hasErr = dayHrs > 24;
            const slices = getSlicesForDay(day);
            const shadows = getShadowsForDay(cal, wi, di);
            const isEmpty = slices.length === 0 && shadows.length === 0 && day.length === 0;
            const slicesHtml = slices.map(s => {
              const top = hourToPixel(s.startHour);
              const bot = hourToPixel(s.endHour);
              const h = Math.max(2, bot - top);
              const isTiny = h < 16;
              const isTwoLine = h >= 26;
              let labelHtml;
              if (isTiny) {
                labelHtml = `<span class="pill-short">${esc(s.meta.label)}</span>`;
              } else if (isTwoLine) {
                const endTime = fromMin(toMin(s.block.startTime) + s.block.duration * 60);
                labelHtml = `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px;width:100%;line-height:1.1"><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0">${esc(s.meta.label)}</span><span style="font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:400;opacity:0.9;flex-shrink:0">${s.block.duration}h</span></div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:400;opacity:0.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;line-height:1.1">${s.block.startTime}→${endTime}</div>`;
              } else {
                labelHtml = `<span class="pill-short">${esc(s.meta.label)}</span><span class="pill-h">${s.block.duration}h</span>`;
              }
              const isTinyCls = isTiny ? 'tiny' : '';
              const twoLineStyle = isTwoLine ? 'flex-direction:column;align-items:stretch;justify-content:center;padding:2px 5px;' : '';
              return `<div class="block-slice bg-${s.meta.color} ${isTinyCls}" style="top:${top}px;height:${h}px;${twoLineStyle}">${labelHtml}</div>`;
            }).join('');
            const shadowsHtml = shadows.map(s => {
              const top = hourToPixel(s.startHour);
              const bot = hourToPixel(s.endHour);
              const h = Math.max(2, bot - top);
              return `<div class="block-slice shadow bg-${s.meta.color}" style="top:${top}px; height:${h}px"></div>`;
            }).join('');
            // Bloco fantasma de amamentação: +2h no fim do último bloco do dia (se algum termina no próprio dia)
            let amamHtml = '';
            if (state.config.amamentacao) {
              let latestEnd = -1;
              day.forEach(b => {
                const m = BLOCK_TYPES[b.type];
                if (!m || !m.counts || m.isTE || !b.duration) return;
                const startH = toMin(b.startTime) / 60;
                const endH = startH + b.duration;
                if (endH <= 24 && endH > latestEnd) latestEnd = endH;
              });
              if (latestEnd >= 0) {
                const gStart = latestEnd;
                const gEnd = Math.min(24, latestEnd + 2);
                const top = hourToPixel(gStart);
                const bot = hourToPixel(gEnd);
                const h = Math.max(2, bot - top);
                const showText = h >= 16;
                amamHtml = `<div class="block-slice amam-ghost" style="top:${top}px;height:${h}px">${showText ? '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;font-style:italic;font-weight:400">+2h amam</span>' : ''}</div>`;
              }
            }
            return `<div class="cal-cell ${di>=5?'weekend':''} ${hasErr?'has-error':''}" data-week="${wi}" data-day="${di}">
              <div class="zone-night zone-night-am"></div>
              <div class="zone-night zone-night-pm"></div>
              <div class="zone-hr" style="top:38px"></div>
              <div class="zone-hr" style="top:54px"></div>
              <div class="zone-mid"></div>
              <div class="zone-hr" style="top:86px"></div>
              <div class="zone-hr" style="top:102px"></div>
              ${shadowsHtml}
              ${amamHtml}
              ${slicesHtml}
              ${isEmpty ? '<div class="cell-day-empty">+</div>' : ''}
            </div>`;
          }).join('');
          return row;
        }).join('')}
      </div>
    </div>
  `;
  mount.innerHTML = html;

  // Event delegation: single listener on the mount for all clicks
  mount.onclick = (e) => {
    const copyBtn = e.target.closest('[data-wk-copy]');
    if (copyBtn) {
      e.stopPropagation();
      const wi = parseInt(copyBtn.getAttribute('data-wk-copy'));
      const doCopy = () => {
        state.calendars[cs][wi] = JSON.parse(JSON.stringify(state.calendars[cs][wi-1]));
        persistCalendar(cs);
        renderAll();
      };
      const target = state.calendars[cs][wi];
      if (weekHasData(target)) {
        showConfirm(`A semana ${wi+1} já tem dados que serão substituídos pelo conteúdo da semana ${wi}. Continuar?`, doCopy);
      } else {
        doCopy();
      }
      return;
    }
    const clearBtn = e.target.closest('[data-wk-clear]');
    if (clearBtn) {
      e.stopPropagation();
      const wi = parseInt(clearBtn.getAttribute('data-wk-clear'));
      const doClear = () => {
        state.calendars[cs][wi] = [[],[],[],[],[],[],[]];
        persistCalendar(cs);
        renderAll();
      };
      const target = state.calendars[cs][wi];
      if (weekHasData(target)) {
        showConfirm(`Limpar todos os blocos da semana ${wi+1}? Esta ação não pode ser desfeita.`, doClear);
      } else {
        doClear();
      }
      return;
    }
    const cell = e.target.closest('.cal-cell');
    if (cell) {
      state.editing = {
        week: parseInt(cell.getAttribute('data-week')),
        day: parseInt(cell.getAttribute('data-day')),
        blockIdx: null
      };
      renderModal();
    }
  };
}

function renderComparison(calcs) {
  const a = calcs.A, b = calcs.B, c = calcs.C;
  function bestIdx(vals, isMax = true) {
    if (isMax) return vals.indexOf(Math.max.apply(null, vals));
    return vals.indexOf(Math.min.apply(null, vals));
  }
  const totalBrutos = [a.brutoMensalMedia + a.privadoBrutoMensal, b.brutoMensalMedia + b.privadoBrutoMensal, c.brutoMensalMedia + c.privadoBrutoMensal];
  const totalLiqs = [a.liquidoMensal + a.privadoBrutoMensal, b.liquidoMensal + b.privadoBrutoMensal, c.liquidoMensal + c.privadoBrutoMensal];
  const ibBruto = bestIdx(totalBrutos);
  const ibLiq = bestIdx(totalLiqs);

  function row(label, vals, opts) {
    opts = opts || {};
    let best = -1;
    if (opts.highlightBest) best = bestIdx(vals);
    return `
      <tr>
        <td>${esc(label)}</td>
        ${vals.map((v, i) => {
          if (opts.raw) return `<td class="${i===best?'best':''}">${esc(String(v))}</td>`;
          if (opts.delta) {
            const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : '';
            return `<td class="${cls}">${v>0?'+':''}${fmt(v)}</td>`;
          }
          return `<td class="${i===best?'best':''}">${fmt(v)}</td>`;
        }).join('')}
      </tr>
    `;
  }

  const html = `
    <section class="comparison">
      <h2 class="section-title">Comparação A · B · C</h2>
      <table class="comp-table">
        <thead>
          <tr><th></th><th class="opt scope-A">A</th><th class="opt scope-B">B</th><th class="opt scope-C">C</th></tr>
        </thead>
        <tbody>
          <tr class="section"><td colspan="4">Componentes anuais (público bruto)</td></tr>
          ${row('Base + DP × 14', [a.annualBaseFixed, b.annualBaseFixed, c.annualBaseFixed])}
          ${row('Suplementos TN × 0,923', [a.annualSuplementos, b.annualSuplementos, c.annualSuplementos])}
          ${row('Trabalho extra TE × 0,923', [a.annualTE, b.annualTE, c.annualTE])}

          <tr class="section"><td colspan="4">Público</td></tr>
          ${row('Bruto anual', [a.brutoPubAnual, b.brutoPubAnual, c.brutoPubAnual])}
          ${row('Bruto mensal (média)', [a.brutoMensalMedia, b.brutoMensalMedia, c.brutoMensalMedia])}
          ${row('SS (11%)', [-a.ssAnual, -b.ssAnual, -c.ssAnual])}
          ${row('IRS (cônjuge incl., −1200€ ded.)', [-a.irsMariana, -b.irsMariana, -c.irsMariana])}
          ${row('Taxa média efectiva', [
            (a.taxaMediaMariana*100).toFixed(2).replace('.',',') + '%',
            (b.taxaMediaMariana*100).toFixed(2).replace('.',',') + '%',
            (c.taxaMediaMariana*100).toFixed(2).replace('.',',') + '%'
          ], {raw: true})}
          ${row('Líquido anual', [a.liquidoAnual, b.liquidoAnual, c.liquidoAnual])}
          ${row('Líquido mensal (média)', [a.liquidoMensal, b.liquidoMensal, c.liquidoMensal])}
          ${row('Δ líquido vs A', [0, b.liquidoMensal - a.liquidoMensal, c.liquidoMensal - a.liquidoMensal], {delta: true})}

          <tr class="section"><td colspan="4">Privado bruto · empresa</td></tr>
          ${row('Privado anual', [a.privadoBrutoAnual, b.privadoBrutoAnual, c.privadoBrutoAnual])}
          ${row('Privado mensal', [a.privadoBrutoMensal, b.privadoBrutoMensal, c.privadoBrutoMensal])}

          <tr class="section"><td colspan="4">Tempo</td></tr>
          ${row('Total horas (8 sem)', [fmtH(a.totalRealHEffective), fmtH(b.totalRealHEffective), fmtH(c.totalRealHEffective)], {raw: true})}
          ${row('SU base / SU extra', [
            fmtH(a.totalSU) + ' / ' + fmtH(a.totalSUExtra),
            fmtH(b.totalSU) + ' / ' + fmtH(b.totalSUExtra),
            fmtH(c.totalSU) + ' / ' + fmtH(c.totalSUExtra)
          ], {raw: true})}

          <tr class="total">
            <td>TOTAL bruto / mês (público + privado)</td>
            ${totalBrutos.map((v, i) => `<td class="${i===ibBruto?'best':''}">${fmt(v)}</td>`).join('')}
          </tr>
          <tr class="total">
            <td>TOTAL líquido + privado bruto / mês</td>
            ${totalLiqs.map((v, i) => `<td class="${i===ibLiq?'best':''}">${fmt(v)}</td>`).join('')}
          </tr>
        </tbody>
      </table>
      <p style="margin: 14px 0 0; font-size: 11px; color: var(--ink-muted); line-height: 1.5; font-style: italic">
        IRS calculado com quociente conjugal (escalões progressivos 2026 sobre rendimento colectável/2, multiplicado por 2) e dedução fixa de 1 200€ à colecta familiar — aproximação típica para casal com 1 filho considerando despesas gerais, dependentes, PPR e saúde. Para situações fora deste padrão (mais filhos, despesas elevadas, sem PPR) o IRS líquido real pode divergir 200–800€/ano.
      </p>
    </section>
  `;
  document.getElementById('comparison-mount').innerHTML = html;
}

    <div style="display:flex; align-items:center; gap:8px; color:var(--ink-soft); grid-column: 1 / -1; padding-top: 8px; margin-top: 4px; border-top: 1px dashed var(--rule)">
      <span class="block-pill amam-ghost" style="min-width:32px; justify-content:center; color: var(--ink-soft); font-style: italic; font-weight: 400">+2h</span>
      <span>Amamentação · 2h fictícias acrescentadas ao fim do último bloco do dia (sem aumento de horas a realizar)</span>
    </div>
  ` : '';
  const html = `
    <section class="comparison" style="padding: 18px 22px">
      <h2 class="section-title" style="margin-bottom:12px">Legenda · tipos de bloco</h2>
      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:10px 16px; font-size:12px">
        ${Object.keys(BLOCK_TYPES).map(k => {
          const v = BLOCK_TYPES[k];
          return `
            <div style="display:flex; align-items:center; gap:8px; color:var(--ink-soft)">
              <span class="block-pill bg-${v.color}" style="min-width:32px; justify-content:center">${v.short}</span>
              <span>${esc(v.label)}</span>

          `;
        }).join('')}
        ${amamItem}

}

function renderImportExport() {
  const html = `
    <section class="io-section">
      <h2 class="section-title">Exportar / importar simulação</h2>
      <p style="font-family:Inter,sans-serif;font-size:14px;color:var(--ink-soft);line-height:1.5;margin:8px 0 16px">Guarda toda a simulação num ficheiro <code style="font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--bg-tint);padding:2px 6px">.json</code> para arquivar ou enviar a alguém. Inclui configuração, calendários dos três cenários, tipos privados e de lazer, tarifas e nota opcional.</p>
      <div class="io-row">
        <label class="io-label">Nota opcional <small>(visível para quem importar)</small></label>
        <textarea id="export-note" rows="2" placeholder="Ex: Cenário base de Mariana com 16h SU/sem, antes da renegociação contratual"></textarea>
      </div>
      <div class="io-actions">
        <button class="btn" id="export-btn">↓ Exportar simulação</button>
        <button class="btn secondary" id="import-btn">↑ Carregar ficheiro</button>
        <input type="file" id="import-file" accept="application/json,.json" style="display:none">
      </div>
    </section>
  `;
  document.getElementById('io-mount').innerHTML = html;

  document.getElementById('export-btn').addEventListener('click', () => {
    const note = (document.getElementById('export-note').value || '').trim();
    const payload = {
      version: 1,
      app: 'simulador-completo-2026',
      exportedAt: new Date().toISOString(),
      note: note,
      currentScenario: state.currentScenario,
      config: state.config,
      calendars: state.calendars,
      lastUsed: state.lastUsed
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    a.download = `simulacao-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.json`;
    a.href = url;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  });

  const fileInput = document.getElementById('import-file');
  document.getElementById('import-btn').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let data;
      try { data = JSON.parse(ev.target.result); }
      catch (err) { showConfirm('Ficheiro inválido — não é JSON válido.', () => {}); fileInput.value = ''; return; }

      // Validação básica de estrutura
      const valid =
        data && typeof data === 'object' &&
        data.config && typeof data.config === 'object' &&
        data.calendars && data.calendars.A && data.calendars.B && data.calendars.C &&
        Array.isArray(data.calendars.A) && data.calendars.A.length === 8;

      if (!valid) {
        showConfirm('Ficheiro inválido — estrutura não reconhecida.\n\nO ficheiro deve ser uma exportação do simulador (config + 3 calendários de 8 semanas).', () => {});
        fileInput.value = '';
        return;
      }

      // Formatar mensagem de confirmação com nota + data
      const expDate = data.exportedAt ? new Date(data.exportedAt) : null;
      const dateStr = expDate ? expDate.toLocaleDateString('pt-PT') + ' ' + expDate.toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'}) : '?';
      const noteStr = data.note ? '"' + data.note + '"' : '(sem nota)';
      const msg = 'Substituir TODA a simulação actual pela importada?\n\nData de exportação: ' + dateStr + '\nNota: ' + noteStr + '\n\nEsta acção não pode ser desfeita.';

      showConfirm(msg, () => {
        // Apply
        try {
          // Limpar tipos custom e leisure registados no BLOCK_TYPES actual
          Object.keys(state.config.customTypes || {}).forEach(id => { delete BLOCK_TYPES[id]; });
          Object.keys(state.config.leisureTypes || {}).forEach(id => { delete BLOCK_TYPES[id]; });

          // Substituir config (mantém defaults para campos em falta)
          const defaults = { categoria: 'Assistente', posicao: 2, amamentacao: false, conjugeBruto: 50000, privateRates: {}, customTypes: {}, leisureTypes: {} };
          state.config = Object.assign({}, defaults, data.config);
          if (!state.config.privateRates || typeof state.config.privateRates !== 'object') state.config.privateRates = {};
          if (typeof state.config.privateRates['consulta-priv'] !== 'number') state.config.privateRates['consulta-priv'] = 80;
          if (typeof state.config.privateRates['ecografia-priv'] !== 'number') state.config.privateRates['ecografia-priv'] = 80;
          if (!state.config.customTypes || typeof state.config.customTypes !== 'object') state.config.customTypes = {};
          if (!state.config.leisureTypes || typeof state.config.leisureTypes !== 'object') state.config.leisureTypes = {};

          // Substituir calendários
          state.calendars = { A: data.calendars.A, B: data.calendars.B, C: data.calendars.C };

          // Substituir lastUsed
          state.lastUsed = (data.lastUsed && typeof data.lastUsed === 'object') ? data.lastUsed : {};

          // Cenário corrente
          if (data.currentScenario && ['A','B','C'].includes(data.currentScenario)) {
            state.currentScenario = data.currentScenario;
          }

          // Re-registar tipos no BLOCK_TYPES
          Object.keys(state.config.customTypes).forEach(id => registerCustomType(id, state.config.customTypes[id]));
          Object.keys(state.config.leisureTypes).forEach(id => registerLeisureType(id, state.config.leisureTypes[id]));

          // Persistir tudo
          persistConfig();
          persistCalendar('A');
          persistCalendar('B');
          persistCalendar('C');
          persistLastUsed();

          // Re-render completo
          renderConfig();
          renderAll();
        } catch (err) {
          showConfirm('Erro ao aplicar o ficheiro: ' + (err.message || err), () => {});
        }
        fileInput.value = '';
      });
    };
    reader.onerror = () => { showConfirm('Erro ao ler o ficheiro.', () => {}); fileInput.value = ''; };
    reader.readAsText(file);
  });
}

function renderModal() {
  const mount = document.getElementById('modal-mount');
  if (!state.editing) { mount.innerHTML = ''; return; }
  const { week, day } = state.editing;
  const blockIdx = (state.editing.blockIdx !== undefined && state.editing.blockIdx !== null) ? state.editing.blockIdx : null;
  const blocks = state.calendars[state.currentScenario][week][day];
  const isEdit = blockIdx !== null && blocks[blockIdx];

  let initialType, initialStart, initialDur;
  if (isEdit) {
    const b = blocks[blockIdx];
    initialType = b.type;
    initialStart = b.startTime;
    initialDur = b.duration;
  } else {
    initialType = 'consulta';
    const d = getDefaultsForType(initialType);
    initialStart = d.startTime;
    initialDur = d.duration;
  }

  mount.innerHTML = `
    <div class="modal-backdrop" id="modal-bg">
      <div class="modal" id="modal-content">
        <div class="modal-head">
          <div class="eyebrow">Semana ${week+1} · ${DAY_LABELS[day]}</div>
          <div class="modal-title">Editar <em>dia</em></div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="modal-body">
          ${blocks.length > 0 ? `
            <div style="font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:8px">Blocos existentes <small style="text-transform:none; letter-spacing:0; font-style:italic; font-family:Inter,sans-serif; color:var(--ink-muted)">· toque para editar</small></div>
            <div class="block-list">
              ${blocks.map((b, i) => {
                const m = BLOCK_TYPES[b.type];
                if (!m) return '';
                const endTime = fromMin(toMin(b.startTime) + b.duration * 60);
                const isActive = isEdit && blockIdx === i;
                return `
                  <div class="block-row ${isActive?'editing':''}" data-edit="${i}" style="border-left-color: var(--${m.color}); ${isActive?'background:var(--paper); box-shadow: inset 0 0 0 1px var(--ink)':''}">
                    <div class="block-info">
                      <strong class="color-${m.color}">${esc(m.label)}${isActive?' · <em style="font-style:italic; color:var(--ink-muted); font-weight:400">a editar</em>':''}</strong>
                      <small>${b.startTime} → ${endTime}</small>
                    </div>
                    <span class="block-h">${b.duration}h</span>
                    <button class="block-del" data-del="${i}">×</button>
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
          <div class="add-block" style="${isEdit?'border-style:solid; border-color:var(--ink)':''}">
            <div class="add-block-title">${isEdit ? 'Editar bloco' : 'Adicionar bloco'}</div>
            <div class="add-fields">
              <select id="add-type">
                ${Object.keys(BLOCK_TYPES).map(k => `<option value="${k}" ${k===initialType?'selected':''}>${esc(BLOCK_TYPES[k].label)}</option>`).join('')}
              </select>
              <input type="time" id="add-start" value="${initialStart}">
              <input type="number" step="0.25" min="0.25" max="24" id="add-dur" value="${initialDur}">
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap">
              <button class="btn" id="add-btn">${isEdit ? 'Guardar' : '+ Adicionar'}</button>
              ${isEdit ? '<button class="btn secondary" id="cancel-edit">Cancelar edição</button>' : ''}
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn" id="modal-close2">Fechar</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target.id === 'modal-bg') closeModal();
  });
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-close2').addEventListener('click', closeModal);

  // Click on block row to edit
  document.querySelectorAll('[data-edit]').forEach(row => {
    row.addEventListener('click', e => {
      // Don't trigger edit if clicking the delete button
      if (e.target.closest('[data-del]')) return;
      const idx = parseInt(row.getAttribute('data-edit'));
      state.editing.blockIdx = (state.editing.blockIdx === idx) ? null : idx;
      renderModal();
    });
  });

  // Delete buttons
  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.getAttribute('data-del'));
      const cs = state.currentScenario;
      state.calendars[cs][week][day].splice(idx, 1);
      // If we were editing this block or one after it, adjust
      if (state.editing.blockIdx !== null && state.editing.blockIdx !== undefined) {
        if (state.editing.blockIdx === idx) state.editing.blockIdx = null;
        else if (state.editing.blockIdx > idx) state.editing.blockIdx -= 1;
      }
      persistCalendar(cs);
      renderModal();
      renderCalendar();
      renderAllDependents();
    });
  });

  // Type change: in add mode, reset start/duration to last-used (or defaults). In edit mode, keep current values.
  document.getElementById('add-type').addEventListener('change', e => {
    if (!isEdit) {
      const d = getDefaultsForType(e.target.value);
      document.getElementById('add-start').value = d.startTime;
      document.getElementById('add-dur').value = d.duration;
    }
    const durInput = document.getElementById('add-dur');
    durInput.max = e.target.value === 'folga' ? '8' : '24'; // folga: duração máxima 8h
    if (e.target.value === 'folga' && parseFloat(durInput.value) > 8) durInput.value = '8';
  });

  // Add/Save button
  document.getElementById('add-btn').addEventListener('click', () => {
    const type = document.getElementById('add-type').value;
    const startTime = document.getElementById('add-start').value;
    const dur = parseFloat(document.getElementById('add-dur').value);
    if (!type || !startTime || !(dur > 0)) return;
    let duration = Math.round(dur * 4) / 4;
    if (type === 'folga') duration = Math.min(duration, 8); // folga: duração máxima 8h
    const block = { type, startTime, duration };
    const cs = state.currentScenario;
    if (isEdit) {
      state.calendars[cs][week][day][blockIdx] = block;
      state.editing.blockIdx = null;
    } else {
      state.calendars[cs][week][day].push(block);
    }
    // Memorizar configuração deste tipo para o próximo bloco
    state.lastUsed[type] = { startTime, duration };
    persistLastUsed();
    persistCalendar(cs);
    renderModal();
    renderCalendar();
    renderAllDependents();
  });

  // Cancel edit
  if (isEdit) {
    document.getElementById('cancel-edit').addEventListener('click', () => {
      state.editing.blockIdx = null;
      renderModal();
    });
  }
}

function closeModal() {
  state.editing = null;
  renderModal();
}

function renderAllDependents() {
  const calcs = calcAll();
  const scoped = document.getElementById('scoped-section');
  if (scoped) scoped.className = `scope-${state.currentScenario}`;
  renderTabs(calcs);
  renderStatus(calcs[state.currentScenario]);
  renderBreakdown(calcs[state.currentScenario]);
  renderComparison(calcs);
}

function renderAll() {
  const calcs = calcAll();
  const scoped = document.getElementById('scoped-section');
  if (scoped) scoped.className = `scope-${state.currentScenario}`;
  renderTabs(calcs);
  renderToolbar();
  renderCalendar();
  renderStatus(calcs[state.currentScenario]);
  renderBreakdown(calcs[state.currentScenario]);
  renderComparison(calcs);
  renderLegend();
  renderModal();
  renderPrivateTypes();
  renderLeisureTypes();
  renderImportExport();
}

// =========== INIT ===========
(async function init() {
  try {
    const c = await loadFromStorage('config', null);
    const defaults = { categoria: 'Assistente', posicao: 2, amamentacao: false, conjugeBruto: 50000 };
    if (c) {
      Object.assign(state.config, defaults, c);
      if (!state.config.conjugeBruto || state.config.conjugeBruto === 0) state.config.conjugeBruto = 50000;
    }
    // Backfill rates/customTypes se vierem em falta de config antigo
    if (!state.config.privateRates || typeof state.config.privateRates !== 'object') {
      state.config.privateRates = { 'consulta-priv': 80, 'ecografia-priv': 80 };
    } else {
      if (typeof state.config.privateRates['consulta-priv'] !== 'number') state.config.privateRates['consulta-priv'] = 80;
      if (typeof state.config.privateRates['ecografia-priv'] !== 'number') state.config.privateRates['ecografia-priv'] = 80;
    }
    if (!state.config.customTypes || typeof state.config.customTypes !== 'object') state.config.customTypes = {};
    if (!state.config.leisureTypes || typeof state.config.leisureTypes !== 'object') state.config.leisureTypes = {};
    // Seed default lazer "Ginásio 1h" se não houver nenhum
    if (Object.keys(state.config.leisureTypes).length === 0) {
      state.config.leisureTypes['ginasio'] = { label: 'Ginásio', short: 'Gym', defaultDur: 1, defaultStart: '07:00' };
    }
    // Registar tipos customizados em BLOCK_TYPES
    Object.keys(state.config.customTypes).forEach(id => registerCustomType(id, state.config.customTypes[id]));
    Object.keys(state.config.leisureTypes).forEach(id => registerLeisureType(id, state.config.leisureTypes[id]));
    const calA = await loadFromStorage('cal:A', null);
    const calB = await loadFromStorage('cal:B', null);
    const calC = await loadFromStorage('cal:C', null);
    state.calendars.A = calA || defaultCalendarA();
    state.calendars.B = calB || defaultCalendarA();
    state.calendars.C = calC || defaultCalendarC();
    const lu = await loadFromStorage('lastUsed', null);
    if (lu && typeof lu === 'object') state.lastUsed = lu;
  } catch (e) {
    state.calendars.A = defaultCalendarA();
    state.calendars.B = defaultCalendarA();
    state.calendars.C = defaultCalendarC();
  }
  state.loaded = true;
  renderConfig();
  renderAll();
})();
</script>
</body>
</html>
